services:
  mcp-coach:
    build: .
    container_name: mcp-coach
    restart: unless-stopped
    ports:
      - "9207:9207"
    volumes:
      - /opt/cycling-club/data:/data
    env_file:
      - .env
    environment:
      - DB_PATH=/data/club.db
    networks:
      - brightdog-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:9207/healthz')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

networks:
  brightdog-net:
    external: true
